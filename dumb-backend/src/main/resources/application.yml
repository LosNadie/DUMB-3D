server:
  port: 8080

spring:
  application:
    name: dumb-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dumb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:dumb-secret-key-change-in-production}
  expire-seconds: 86400

# DeepSeek（OpenAI 兼容接口）。密钥务必用环境变量注入，勿提交到仓库。
ai:
  base-url: ${AI_BASE_URL:https://api.deepseek.com}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:deepseek-chat}

# Last.fm API，用于拉取专辑曲目列表（不需要 OAuth 跳转）。
lastfm:
  enabled: ${LASTFM_ENABLED:true}
  api-key: ${LASTFM_API_KEY:}
  base-url: ${LASTFM_BASE_URL:https://ws.audioscrobbler.com/2.0/}
  autocorrect: ${LASTFM_AUTOCORRECT:true}
